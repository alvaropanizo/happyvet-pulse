services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: happyvet-pulse-backend
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: happyvet-pulse-frontend
    ports:
      - "5173:5173"
    environment:
      - BACKEND_API_BASE_URL=http://localhost:8000
    command: sh -c "if [ ! -d node_modules/react ] || [ ! -d node_modules/bootstrap ] || [ ! -d node_modules/react-bootstrap ] || [ ! -d node_modules/bootstrap-icons ]; then npm ci; fi && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend_node_modules:
